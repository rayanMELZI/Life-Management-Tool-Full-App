name: CI

on:
  push:
    branches: [main]
  pull_request:

# Never let two pipeline runs (and especially two deploys) overlap.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
#   backend-test:
#     runs-on: ubuntu-latest
#     defaults:
#       run:
#         working-directory: lmt-backend
#     steps:
#       - uses: actions/checkout@v4

#       - uses: actions/setup-java@v4
#         with:
#           distribution: temurin
#           java-version: "24"
#           cache: maven

#       - name: Run tests
#         run: ./mvnw verify -B

#   frontend-check:
#     runs-on: ubuntu-latest
#     defaults:
#       run:
#         working-directory: lmt-frontend
#     steps:
#       - uses: actions/checkout@v4

#       - uses: actions/setup-node@v4
#         with:
#           node-version: "24"
#           cache: npm
#           cache-dependency-path: lmt-frontend/package-lock.json

#       - name: Install dependencies
#         run: npm ci

#       - name: Lint
#         run: npm run lint

#       - name: Build
#         run: npm run build

  # Only on main, after tests pass: build both images and push to GHCR.
  publish-images:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [backend-test, frontend-check]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: lmt-backend
            context: lmt-backend
          - name: lmt-frontend
            context: lmt-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            type=raw,value=latest
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

  # After images are published: render config from GitHub secrets, ship it to
  # the VM, and restart the stack on the exact build published above.
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: publish-images
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: read
    env:
      # cloudflared reads these to authenticate through Cloudflare Access
      # (the CI equivalent of your interactive browser login).
      TUNNEL_SERVICE_TOKEN_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      TUNNEL_SERVICE_TOKEN_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: Render .env from repository secrets
        run: |
          cp deploy/compose.prod.yml compose.prod.yml
          cat > .env <<EOF
          IMAGE_OWNER=${GITHUB_REPOSITORY_OWNER@L}
          IMAGE_TAG=sha-${GITHUB_SHA::7}
          POSTGRES_DB=lmt
          POSTGRES_USER=lmt
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          SECURE_COOKIES=${{ vars.SECURE_COOKIES || 'false' }}
          VAPID_PUBLIC_KEY=${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY=${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT=${{ secrets.VAPID_SUBJECT }}
          EOF

      - name: Install cloudflared
        run: |
          curl -fsSL -o /tmp/cloudflared \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          sudo install /tmp/cloudflared /usr/local/bin/cloudflared

      - name: Configure SSH through the Cloudflare tunnel
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat > ~/.ssh/config <<EOF
          Host vm
            HostName ${{ secrets.DEPLOY_HOST }}
            User ${{ secrets.DEPLOY_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking accept-new
            ProxyCommand cloudflared access ssh --hostname %h
          EOF

      - name: Copy compose file and .env to the VM
        run: scp compose.prod.yml .env vm:/opt/fnts/

      - name: Pull the new images and restart the stack
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ssh vm "GHCR_USER='$GHCR_USER' GHCR_TOKEN='$GHCR_TOKEN' bash -s" <<'EOF'
          set -e
          cd /opt/fnts
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
          docker compose -f compose.prod.yml pull
          docker compose -f compose.prod.yml up -d
          docker image prune -f
          docker logout ghcr.io
          EOF
