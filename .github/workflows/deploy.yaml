name: CI

on:
  push:
    branches: [main]
  pull_request:

# Never let two pipeline runs overlap.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lmt-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run tests
        run: ./mvnw verify -B

  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lmt-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: lmt-frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

  # Only on main, after tests pass: build both images and push to GHCR.
  publish-images:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [backend-test, frontend-check]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: lmt-backend
            context: lmt-backend
          - name: lmt-frontend
            context: lmt-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          # metadata-action lowercases the owner, so ghcr.io/<owner>/<name> is valid.
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            type=raw,value=latest
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
