# Database credentials. EDIT THESE VALUES before applying (these are placeholders).
# stringData lets you type plain text; Kubernetes stores it base64-encoded.
apiVersion: v1
kind: Secret
metadata:
  name: lmt-db
  namespace: lmt
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: "change-me-root"
  MYSQL_DATABASE: "lmt"
  MYSQL_USER: "lmt"
  MYSQL_PASSWORD: "change-me-app"
