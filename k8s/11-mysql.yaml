# MySQL 8 with a persistent volume. On k3s the default "local-path" StorageClass
# provisions the PVC automatically.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-data
  namespace: lmt
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: lmt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  # A DB pod must not run twice against one RWO volume; recreate on update.
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.4
          args: ["--default-authentication-plugin=caching_sha2_password"]
          ports:
            - containerPort: 3306
          envFrom:
            - secretRef:
                name: lmt-db
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          livenessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "127.0.0.1"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "127.0.0.1"]
            initialDelaySeconds: 15
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mysql-data
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: lmt
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
