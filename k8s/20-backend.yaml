apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: lmt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      # GHCR images are private by default. Create this secret once (see k8s/README.md),
      # or make the package public and delete this line.
      imagePullSecrets:
        - name: ghcr-cred
      containers:
        - name: backend
          image: ghcr.io/rayanmelzi/lmt-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: DB_URL
              value: "jdbc:mysql://mysql:3306/lmt"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: lmt-db
                  key: MYSQL_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lmt-db
                  key: MYSQL_PASSWORD
          # No actuator on the classpath, so probe the TCP port instead of /health.
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: lmt
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
