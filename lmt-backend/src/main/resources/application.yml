server:
  port: ${PORT:8080}

spring:
  application:
    name: lmt

  # set DB_URL, DB_USERNAME and DB_PASSWORD environment variables in
  # production; the defaults below are for a local MySQL instance
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/lmt_springboot?createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        "[format_sql]": true
    database: mysql
    database-platform: org.hibernate.dialect.MySQLDialect

springdoc:
  swagger-ui:
    path: /api-docs
